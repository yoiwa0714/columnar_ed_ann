    non_column_lr: [0.04, 0.04, 0.04, 0.04, 0.04]  # 非コラムニューロン学習率（層別）
    column_lr: [0.0002, 0.00016, 0.00012, 0.00008, 0.00006]  # コラムニューロン学習率（層別）
    column_lr_factors: [0.005, 0.004, 0.003, 0.002, 0.0015]  # column_lr / output_lr の比率
