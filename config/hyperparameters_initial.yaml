    gabor_kernel_size: 11  # Gaborフィルタのカーネルサイズ
    description: '6層純粋版主力構成、cn=82, h=[2048×6], lr=0.04, gc=0.0001, k11。MNIST 98.53%(50k/10ep, Ep9)・98.64%(50k/20ep, Ep15)達成（2026-04-30更新）'

# 共通パラメータ（層数非依存）
common_params:
  activation: 'tanh'             # 活性化関数（ED法ではtanhが標準）
  init_method: 'he'              # 重み初期化方式
  use_hexagonal: true             # ハニカム配置（コラム構造の生物学的配置）

  # --- ホメオスタティック調整 ---
  # 有無の精度差が有意でないため標準パラメータから除外（2026-04-29）
  # 必要な場合は CLI で --homeostatic_rate 0.02 を指定すること
  # homeostatic_rate: 0.02  # （不採用: homeostatic_rate=0.0 との差 -0.09%、誤差範囲）

# Gabor特徴抽出パラメータ（V1単純型細胞モデル）
gabor_params:
  orientations: 8                 # 方位数（V1の方位選択性コラムに対応）
  frequencies: 2                  # 空間周波数帯域数
  kernel_size: 11                 # カーネルサイズ（k11が最良）
  pool_size: 4                    # 平均プーリングウィンドウサイズ
  pool_stride: 4                  # プーリングストライド

# データセット別差分パラメータ
# layer_params をベースに、ここに記載した値だけを上書きする。
# 記載のないデータセット・層数は layer_params の値をそのまま使用。
# 新しいデータセット: dataset_overrides に新エントリを追加するだけでよい。
dataset_overrides:

  # MNIST（デフォルト基準）: layer_params と同一のため空エントリ
  mnist: {}

  # Fashion-MNIST: MNISTより複雑。gradient_clip をやや緩めに設定
  fashion:
    1:
      gradient_clip: 0.001        # 1層: MNISTより複雑なため緩めに
    2:
      gradient_clip: 0.001        # 2層: MNIST最適値(0.0001)より緩めに
    3:
      gradient_clip: 0.001        # 3層: MNIST最適値(0.0001)より緩めに
    4:
      gradient_clip: 0.001
    5:
      gradient_clip: 0.001
    6:
      gradient_clip: 0.001

  # CIFAR-10: カラー3チャンネル, 32×32。隠れ層を大きく取る必要あり
  cifar10:
    1:
      hidden: [4096]
      gradient_clip: 0.001
    2:
      hidden: [4096, 2048]
      gradient_clip: 0.001
    3:
      hidden: [2048, 1024, 1024]
      gradient_clip: 0.001
    4:
      hidden: [2048, 1024, 1024, 1024]
      gradient_clip: 0.001
    5:
      hidden: [2048, 1024, 1024, 1024, 1024]
      gradient_clip: 0.001
    6:
      hidden: [2048, 1024, 1024, 1024, 1024, 1024]
      gradient_clip: 0.001

  # 未知データセットのデフォルト: layer_params と同一（差分なし）
  # 自動複雑さ判定で「mnistに近い」「fashionに近い」が選ばれた場合はそちらを使用
  default: {}
