    non_column_lr: [0.04, 0.04, 0.04, 0.04]  # 非コラムニューロン学習率（層別）
    column_lr: [0.0002, 0.00016, 0.00012, 0.00008]  # コラムニューロン学習率（層別）
    column_lr_factors: [0.005, 0.004, 0.003, 0.002]  # column_lr / output_lr の比率
    epochs: 20  # 学習エポック数（20epでBest到達）
    gabor_orientations: 8  # Gaborフィルタの方位数
    gabor_frequencies: 2   # Gaborフィルタの空間周波数帯域数
    gabor_kernel_size: 11  # Gaborフィルタのカーネルサイズ
    description: '4層最適構成、cn=10, h=[1024×4], lr=0.04, gc=0.0001, k11, is=[0.7,1.8,1.8,1.8,0.8]。Best=96.99%@10k/20ep（2026-03-22）'

  5:  # 5層構成
    hidden: [1024, 1024, 1024, 1024, 1024]  # 隠れ層のニューロン数
    u1: 0.5  # アミン拡散係数（出力層→最終隠れ層）
    u2: 0.8  # アミン拡散係数（隠れ層間）
    column_neurons: 10  # コラムニューロン数
    weight_init_scales: [0.7, 1.8, 1.8, 1.8, 1.8, 0.8]  # 重み初期化スケール（層別）
    hidden_sparsity: [0.4, 0.4, 0.4, 0.4, 0.4]  # 非コラムニューロンの接続スパース率（層別）
    gradient_clip: 0.0001  # 勾配クリップ値（飽和抑制）
