    output_lr: 0.15  # 出力層学習率
    non_column_lr: [0.15]  # 非コラムニューロン学習率（層別）
    column_lr: [0.0015]  # コラムニューロン学習率（層別）
    column_lr_factors: [0.01]  # column_lr / output_lr
