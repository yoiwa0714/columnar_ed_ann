# ハイパーパラメータ設定
# 最終更新: 2026-04-30

layer_params:
  1:  # 1層構成
    hidden: [2048]  # 隠れ層のニューロン数
    u1: 0.5  # アミン拡散係数（出力層→最終隠れ層）
    u2: 0.8  # アミン拡散係数（隠れ層間）
    column_neurons: 1  # コラムニューロン数（1層構成は1が最適）
    weight_init_scales: [0.4, 1.0]  # 重み初期化スケール（[入力層, 出力層]）
    hidden_sparsity: 0.4  # 非コラムニューロンの接続スパース率
    gradient_clip: 0.0001  # 勾配クリップ値（飽和抑制）
    output_lr: 0.15  # 出力層学習率
    non_column_lr: [0.15]  # 非コラムニューロン学習率（層別）
    column_lr: [0.0015]  # コラムニューロン学習率（層別）
    column_lr_factors: [0.01]  # column_lr / output_lr の比率
    epochs: 10  # 学習エポック数
    gabor_orientations: 8  # Gaborフィルタの方位数
    gabor_frequencies: 2   # Gaborフィルタの空間周波数帯域数
    gabor_kernel_size: 11  # Gaborフィルタのカーネルサイズ
    description: '1層最適構成、2048ニューロン、87.66%達成（2026-02-07）'

  2:  # 2層構成
    hidden: [2048, 1024]  # 隠れ層のニューロン数
    u1: 0.5  # アミン拡散係数（出力層→最終隠れ層）
    u2: 0.8  # アミン拡散係数（隠れ層間）
    column_neurons: 10  # コラムニューロン数
    weight_init_scales: [0.7, 1.8, 0.8]  # 重み初期化スケール（層別）
    hidden_sparsity: [0.4, 0.4]  # 非コラムニューロンの接続スパース率（層別）
    gradient_clip: 0.0001  # 勾配クリップ値（飽和抑制）
    output_lr: 0.15  # 出力層学習率
    non_column_lr: [0.15, 0.15]  # 非コラムニューロン学習率（層別）
    column_lr: [0.00075, 0.00045]  # コラムニューロン学習率（層別）
    column_lr_factors: [0.005, 0.003]  # column_lr / output_lr の比率
    epochs: 20  # 学習エポック数
    gabor_orientations: 8  # Gaborフィルタの方位数
    gabor_frequencies: 2   # Gaborフィルタの空間周波数帯域数
    gabor_kernel_size: 11  # Gaborフィルタのカーネルサイズ
    description: '2層最適構成、cn=10, is=[0.7,1.8,0.8], k11。MNIST 97.03%(10k/10ep)達成（2026-03-22）'

  3:  # 3層構成（純粋版主力構成、2026-04-30更新）
    hidden: [2048, 2048, 2048]  # 隠れ層のニューロン数（純粋版主力: 2048×3）
    u1: 0.5  # アミン拡散係数（出力層→最終隠れ層）
    u2: 0.8  # アミン拡散係数（隠れ層間）
    column_neurons: 82  # コラムニューロン数（純粋版主力: cn=82）
    weight_init_scales: [0.7, 1.8, 1.8, 0.8]  # 重み初期化スケール（層別）
    hidden_sparsity: [0.4, 0.4, 0.4]  # 非コラムニューロンの接続スパース率（層別）
    gradient_clip: 0.0001  # 勾配クリップ値（飽和抑制）
    output_lr: 0.15  # 出力層学習率
    non_column_lr: [0.15, 0.15, 0.15]  # 非コラムニューロン学習率（層別）
    column_lr: [0.00075, 0.0006, 0.0003]  # コラムニューロン学習率（層別）
    column_lr_factors: [0.005, 0.004, 0.002]  # column_lr / output_lr の比率
    epochs: 10  # 学習エポック数（純粋版A型: Ep7前後でベスト）
    gabor_orientations: 8  # Gaborフィルタの方位数
    gabor_frequencies: 2   # Gaborフィルタの空間周波数帯域数
    gabor_kernel_size: 11  # Gaborフィルタのカーネルサイズ
    description: '3層純粋版主力構成、cn=82, h=[2048×3], lr=0.15, gc=0.0001, k11。MNIST 98.36%(50k/10ep, Ep7)達成（2026-04-30更新）'

  4:  # 4層構成
