    gabor_orientations: 8  # 2層Phase A検証から全層共通適用
    gabor_frequencies: 2   # 2層Phase A検証から全層共通適用
    gabor_kernel_size: 11  # 2層Phase A検証でk11が最良(+0.21% @10k) → 全層共通適用
    # v044グリッドサーチ最適化結果（2026-02-07）:
    #   Phase 1: init_scale_layer0 × init_scale_output × hidden_sparsity (27通り)
    #     最適: L0=0.4, out=1.0, hs=0.4 → Test=87.64%
