    # v045グリッドサーチ最適化結果（2026-02-12更新）:
    #   Phase 1a: init_scales L0×L1×out (27通り) → L0=0.7, L1=0.7, out=0.8
    #   Phase 1b: init_scales 精密探索 L0×L1 (16通り) → [0.7,0.7,0.8]確定
